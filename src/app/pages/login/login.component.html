<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="logo">📦</div>
      <h1>Warehouse Management System</h1>
      <p>Sign in to your account</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="login()">
      <!-- Error Message -->
      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <!-- Email Field -->
      <div class="form-group">
        <label>Email Address</label>
        <input 
          type="email" 
          formControlName="email"
          placeholder="Enter your email"
          [attr.aria-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" >
        <span class="error-text" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          Please enter a valid email
        </span>
      </div>

      <!-- Password Field -->
      <div class="form-group">
        <label>Password</label>
        <div class="password-input-group">
          <input 
            [type]="isPasswordVisible ? 'text' : 'password'"
            formControlName="password"
            placeholder="Enter your password" >
          <button 
            type="button" 
            class="toggle-password"
            (click)="togglePasswordVisibility()">
            {{ isPasswordVisible ? '🙈' : '👁️' }}
          </button>
        </div>
        <span class="error-text" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          Password must be at least 6 characters
        </span>
      </div>

      <!-- Role Selection -->
      <div class="form-group">
        <label>Login as</label>
        <div class="role-options">
          <label class="role-option">
            <input 
              type="radio" 
              formControlName="role" 
              value="EMPLOYEE">
            <span>👤 Employee</span>
          </label>
          <label class="role-option">
            <input 
              type="radio" 
              formControlName="role" 
              value="WAREHOUSE">
            <span>📦 Warehouse</span>
          </label>
          <label class="role-option">
            <input 
              type="radio" 
              formControlName="role" 
              value="OPERATIONS">
            <span>🚚 Operations</span>
          </label>
        </div>
      </div>

      <!-- Login Button -->
      <button 
        type="submit" 
        class="btn-login"
        [disabled]="loginForm.invalid || loading">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <!-- Demo Credentials -->
    <div class="demo-info">
      <p><strong>Demo Credentials:</strong></p>
      <p>Email: demo@warehouse.com</p>
      <p>Password: password123</p>
    </div>
  </div>

  <!-- Background Animation -->
  <div class="background-animation">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
    <div class="circle circle-3"></div>
  </div>
</div>
