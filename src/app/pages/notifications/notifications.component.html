<div class="notifications-container">
  <div class="header">
    <h1>Notifications</h1>
    <div class="header-actions">
      <span class="unread-count" *ngIf="getUnreadCount() > 0">
        {{ getUnreadCount() }} Unread
      </span>
      <button class="btn btn-secondary" (click)="markAllAsRead()" *ngIf="getUnreadCount() > 0">
        Mark all as read
      </button>
    </div>
  </div>

  <div class="filter-section">
    <button 
      class="filter-btn" 
      [class.active]="selectedFilter === 'ALL'"
      (click)="onFilterChange('ALL')">
      All Notifications
    </button>
    <button 
      class="filter-btn" 
      [class.active]="selectedFilter === 'UNREAD'"
      (click)="onFilterChange('UNREAD')">
      Unread ({{ getUnreadCount() }})
    </button>
  </div>

  <div class="loading" *ngIf="loading">
    <div class="spinner"></div>
    <p>Loading notifications...</p>
  </div>

  <div class="notifications-list" *ngIf="!loading">
    <div class="notification-item" 
      *ngFor="let notification of filteredNotifications"
      [class.unread]="!notification.isRead"
      (click)="handleNotificationClick(notification)">
      
      <div class="notification-icon" [style.background-color]="getTypeColor(notification.type)">
        {{ notification.icon || '•' }}
      </div>

      <div class="notification-content">
        <h4>{{ notification.title }}</h4>
        <p>{{ notification.message }}</p>
        <span class="notification-time">{{ notification.createdDate | date: 'short' }}</span>
      </div>

      <button class="notification-close" (click)="deleteNotification(notification.id); $event.stopPropagation()">
        ✕
      </button>
    </div>

    <div class="empty-state" *ngIf="filteredNotifications.length === 0">
      <p>🔔 No notifications</p>
    </div>
  </div>
</div>
